<svg viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555555"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1000" height="420" fill="#ffffff"/>

  <!-- Attacker box -->
  <rect x="40" y="150" width="240" height="130" rx="10" fill="#fdecec" stroke="#c0392b" stroke-width="2"/>
  <text x="160" y="185" text-anchor="middle" font-size="18" font-weight="bold" fill="#8e2a1f">MacBook Air</text>
  <text x="160" y="207" text-anchor="middle" font-size="13" fill="#8e2a1f">Attacker</text>
  <text x="160" y="232" text-anchor="middle" font-size="12" fill="#333333">nmap · Hydra</text>
  <text x="160" y="252" text-anchor="middle" font-size="13" font-family="Menlo, monospace" fill="#333333">192.168.64.1</text>

  <!-- Target box -->
  <rect x="720" y="150" width="240" height="130" rx="10" fill="#eaf2fb" stroke="#2c5aa0" stroke-width="2"/>
  <text x="840" y="185" text-anchor="middle" font-size="18" font-weight="bold" fill="#1f3d63">Ubuntu VM</text>
  <text x="840" y="207" text-anchor="middle" font-size="13" fill="#1f3d63">Target (UTM)</text>
  <text x="840" y="232" text-anchor="middle" font-size="12" fill="#333333">OpenSSH 10.2p1</text>
  <text x="840" y="252" text-anchor="middle" font-size="13" font-family="Menlo, monospace" fill="#333333">192.168.64.8</text>

  <!-- Shared network label -->
  <text x="500" y="130" text-anchor="middle" font-size="13" fill="#666666">Shared Network (UTM) — 192.168.64.0/24</text>
  <line x1="290" y1="140" x2="710" y2="140" stroke="#bbbbbb" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Step 1: Recon -->
  <line x1="290" y1="190" x2="710" y2="190" stroke="#555555" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="182" text-anchor="middle" font-size="13" fill="#333333">1. Recon — nmap -sV -p 22  (T1046)</text>

  <!-- Step 2: Brute force -->
  <line x1="290" y1="230" x2="710" y2="230" stroke="#c0392b" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="500" y="222" text-anchor="middle" font-size="13" fill="#8e2a1f">2. Brute Force — Hydra → testuser:123456  (T1110)</text>

  <!-- Step 3: Persistence -->
  <line x1="290" y1="270" x2="710" y2="270" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="500" y="262" text-anchor="middle" font-size="13" fill="#6c3483">3. Persistence — sysupdate account + cron beacon  (T1136 / T1053.003)</text>

  <!-- Legend / footer -->
  <text x="500" y="330" text-anchor="middle" font-size="12" fill="#888888">SSH Brute-Force Attack Simulation &amp; Detection Lab</text>
  <text x="500" y="350" text-anchor="middle" font-size="11" fill="#aaaaaa">Recon → Credential Access → Persistence → Investigation</text>
</svg>
